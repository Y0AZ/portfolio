<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="50%" y="40%" text-anchor="middle" font-size="20" fill="#fff">
    made by <tspan fill="#00f7ff" filter="url(#glow)">YOAZ</tspan>
  </text>

  <text x="50%" y="70%" text-anchor="middle" font-size="36" font-weight="bold" fill="#ffffff">
    portfolio
  </text>

  <rect width="100%" height="100%" fill="#000" />
</svg>